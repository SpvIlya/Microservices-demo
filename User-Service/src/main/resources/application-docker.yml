spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://postgres:5432/userdb
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: kafka:9092

kafka:
  topic:
    user-events: user-events

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/